<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>snackpage — manage</title>
  <script>
    // Resolve the active theme before paint to avoid FOUC.
    //   priority: ?theme=X > localStorage.snackpageTheme > "catppuccin-mocha"
    // A ?theme=X param is persisted into localStorage so the choice sticks
    // across reloads. The theme <link> is appended dynamically — it lands
    // AFTER style.css in DOM order so theme rules win cascade ties.
    (function () {
      var params = new URLSearchParams(location.search);
      var theme = params.get("theme") || localStorage.getItem("snackpageTheme") || "catppuccin-mocha";
      if (params.has("theme")) localStorage.setItem("snackpageTheme", theme);
      document.documentElement.setAttribute("data-theme", theme);
      var link = document.createElement("link");
      link.rel = "stylesheet";
      link.id = "theme-css";
      link.href = "/static/themes/" + theme + ".css";
      document.head.appendChild(link);
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css{{if .Version}}?v={{.Version}}{{end}}">
  <link rel="stylesheet" href="/static/manage.css{{if .Version}}?v={{.Version}}{{end}}">
</head>
<body class="manage-body">
  <main class="manage manage-page" id="manage" data-mode="insert">
    <div class="manage-header">
      <a href="/" class="cross-link back-link" tabindex="-1">← picker</a>
      <span class="manage-title">snackpage / manage</span>
      <input id="filter" type="text" placeholder="filter…" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
      <button id="add-btn" type="button" class="btn btn-primary" tabindex="-1">+ Add</button>
    </div>

    <div class="manage-table-wrap">
      <table id="manage-table" class="manage-table">
        <thead>
          <tr>
            <th class="col-title">Title</th>
            <th class="col-url">URL</th>
            <th class="col-tags">Tags</th>
            <th class="col-aliases">Aliases</th>
            <th class="col-del" aria-label="delete"></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <div class="manage-footer">
      <span id="row-count"></span>
      <span id="hints" class="manage-hints">Tab nav · ⎋ revert + normal · ⏎ save+down · ⌘⏎ open in new tab · ? help</span>
    </div>
  </main>

  <div id="modal-root"></div>

  <script src="/static/vendor/fzf.umd.min.js{{if .Version}}?v={{.Version}}{{end}}"></script>
  <script type="module" src="/static/manage.js{{if .Version}}?v={{.Version}}{{end}}"></script>
</body>
</html>
